<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="To-Do Life Dashboard - A productivity dashboard with clock, focus timer, to-do list, and quick links">
  <title>To-Do Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Settings Toggle Button -->
  <button id="settings-toggle" class="settings-toggle" aria-label="Open settings" aria-expanded="false">
    ⚙️
  </button>

  <!-- Settings Panel -->
  <aside id="settings-panel" class="settings-panel" aria-label="Settings" hidden>
    <div class="settings-header">
      <h2>Settings</h2>
      <button id="settings-close" class="settings-close" aria-label="Close settings">×</button>
    </div>

    <div class="settings-section">
      <label class="settings-label" for="theme-toggle">Dark Mode</label>
      <button id="theme-toggle" class="toggle-btn" role="switch" aria-checked="false" aria-label="Toggle dark mode">
        <span class="toggle-thumb"></span>
      </button>
    </div>

    <div class="settings-section">
      <label class="settings-label" for="custom-name">Your Name</label>
      <input type="text" id="custom-name" class="settings-input" placeholder="Enter your name..." maxlength="30" aria-label="Your name for greeting" autocomplete="off">
    </div>

    <div class="settings-section">
      <label class="settings-label" for="pomodoro-duration">Pomodoro Duration (minutes)</label>
      <input type="number" id="pomodoro-duration" class="settings-input" min="1" max="120" value="25" aria-label="Pomodoro timer duration in minutes">
    </div>
  </aside>

  <main class="dashboard" role="main">
    <!-- Clock Component -->
    <section class="clock-container" aria-label="Clock and Greeting">
      <h1 id="greeting" aria-label="Greeting">Good Morning</h1>
      <div id="time" aria-label="Current time" aria-live="polite">00:00:00</div>
      <div id="date" aria-label="Current date">Monday, January 1, 2025</div>
    </section>

    <!-- Timer Component -->
    <section class="timer-container" aria-label="Focus Timer">
      <div id="timer-display" aria-label="Timer display" aria-live="polite">25:00</div>
      <div id="timer-state" aria-label="Timer state" aria-live="polite">Stopped</div>
      <div class="timer-controls" role="group" aria-label="Timer controls">
        <button id="start-btn" aria-label="Start timer">Start</button>
        <button id="pause-btn" aria-label="Pause timer">Pause</button>
        <button id="reset-btn" aria-label="Reset timer">Reset</button>
      </div>
    </section>

    <!-- Quick Links Component -->
    <section class="links-container" aria-label="Quick Links">
      <h2>Quick Links</h2>
      <div class="links-input-group" role="group" aria-label="Add quick link">
        <input type="text" id="link-name" placeholder="Site name..." aria-label="Link name" autocomplete="off">
        <input type="url" id="link-url" placeholder="https://..." aria-label="Link URL" autocomplete="off">
        <button id="add-link-btn" aria-label="Add link">Add</button>
      </div>
      <div id="links-list" class="links-grid" role="list" aria-label="Quick links list"></div>
    </section>

    <!-- To-Do List Component -->
    <section class="todo-container" aria-label="To-Do List">
      <div class="todo-header">
        <h2>To-Do List</h2>
        <div class="todo-sort" role="group" aria-label="Sort tasks">
          <label for="sort-select" class="sr-only">Sort by</label>
          <select id="sort-select" aria-label="Sort tasks by">
            <option value="default">Default order</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="active">Active first</option>
            <option value="completed">Completed first</option>
          </select>
        </div>
      </div>
      <div class="todo-input-group" role="group" aria-label="Add task">
        <input type="text" id="todo-input" placeholder="Add a new task..." aria-label="Task name" autocomplete="off">
        <button id="add-task-btn" aria-label="Add task">Add</button>
      </div>
      <ul id="todo-list" aria-label="Tasks list"></ul>
    </section>
  </main>

  <script src="js/app.js"></script>
  <div id="notification" class="notification" role="alert" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
